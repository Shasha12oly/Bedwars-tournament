services:
  # Web Service for Node.js application
  - type: web
    name: bedwars-tournament
    runtime: node
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    nodeVersion: 18
    plan: free
    region: oregon
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    healthCheckPath: /
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
