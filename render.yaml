services:
  # Web Service for Node.js application
  - type: web
    name: bedwars-tournament
    runtime: node
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    nodeVersion: 18
    plan: free
    region: oregon
    envVars:
      - key: NODE_ENV
        value: production
      - key: DISCORD_BOT_TOKEN
        sync: false
        generateValue: ""
        description: "Discord bot token for team registration notifications"
      - key: DISCORD_CHANNEL_ID
        sync: false
        generateValue: ""
        description: "Discord channel ID for team registration messages"
      - key: DISCORD_GUILD_ID
        sync: false
        generateValue: ""
        description: "Discord server/guild ID for bot operations"
      - key: DISCORD_RULES_CHANNEL_ID
        sync: false
        generateValue: ""
        description: "Discord channel ID for rules announcements"
      - key: DISCORD_PING_EVERYONE
        sync: false
        generateValue: "true"
        description: "Whether to ping @everyone in announcements"
      - key: DISCORD_STORAGE_CHANNEL_ID
        sync: false
        generateValue: ""
        description: "Discord channel ID for JSON data storage messages"
      - key: DISCORD_HOST_ROLE_ID
        sync: false
        generateValue: ""
        description: "Discord role ID for tournament host permissions"
    healthCheckPath: /
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
